<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat Express</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Forzar que el zoom no actúe si el navegador intenta ignorar el meta-tag */
    html, body {
      overflow: hidden;
      touch-action: pan-x pan-y;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col md:flex-row p-2 sm:p-4 gap-2 sm:gap-4 overflow-hidden select-none">

  <div class="flex-1 bg-gray-800 rounded-lg flex flex-col shadow-lg overflow-hidden order-1 md:order-2">
    
    <div id="ventana-chat" class="flex-1 p-3 sm:p-4 overflow-y-auto space-y-3 flex flex-col h-full text-xs sm:text-sm">
      </div>

    <form id="form-chat" class="p-3 sm:p-4 bg-gray-750 border-t border-gray-700 flex gap-2 items-center">
      <input type="text" id="input-mensaje" placeholder="Escribí un mensaje... 😊" required autocomplete="off"
             class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-xs sm:text-sm text-white focus:outline-none focus:border-emerald-500">
      <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 sm:px-6 py-2 rounded text-xs sm:text-sm transition-colors shrink-0">
        Enviar
      </button>
    </form>

  </div>

  <div class="w-full md:w-1/4 bg-gray-800 rounded-lg p-3 sm:p-4 flex flex-row md:flex-col justify-between items-center md:items-stretch shadow-lg gap-3 order-2 md:order-1 shrink-0">
    <div class="flex flex-row md:flex-col items-center md:items-start gap-2 md:gap-0 w-full md:w-auto">
      <h2 class="text-sm sm:text-base md:text-xl font-bold md:mb-4 text-emerald-400 whitespace-nowrap">Configuración</h2>
      
      <div class="flex items-center md:block gap-2 w-full">
        <label class="hidden md:block text-xs sm:text-sm font-medium mb-2">Tu Usuario:</label>
        <input type="text" id="input-usuario" value="Invitado" 
               class="w-full max-w-[150px] md:max-w-none bg-gray-700 border border-gray-600 rounded px-2 py-1 md:px-3 md:py-2 text-xs sm:text-sm text-white focus:outline-none focus:border-emerald-500">
      </div>
    </div>
    
    <div class="text-[10px] sm:text-xs text-gray-500 whitespace-nowrap md:mt-2">
      Muestra para Richard v1.0
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line) {
      alert("Error en el código:\n" + msg + "\nEn línea: " + line);
    };
  </script>

  <script src="app.js"></script>
</body>
</html>
